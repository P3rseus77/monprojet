<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — MonSite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">MonSite</div>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="apropos.html">À propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Contact</h1>
        <p>On se parle ?</p>
    </header>

    <section class="contact">
        <div class="formulaire-wrapper">
            <div id="message-statut"></div>
            <form action="traitement.php" method="POST">

                <div class="champ">
                    <label for="nom">Votre nom *</label>
                    <input type="text" id="nom" name="nom" required placeholder="Jean Dupont">
                </div>

                <div class="champ">
                    <label for="email">Votre email *</label>
                    <input type="email" id="email" name="email" required placeholder="jean@exemple.fr">
                </div>

                <div class="champ">
                    <label for="sujet">Sujet *</label>
                    <input type="text" id="sujet" name="sujet" required placeholder="Demande de devis">
                </div>

                <div class="champ">
                    <label for="message">Votre message *</label>
                    <textarea id="message" name="message" required rows="6" placeholder="Décrivez votre projet..."></textarea>
                </div>

                <button type="submit" class="bouton">Envoyer le message</button>

            </form>
        </div>
    </section>

    <footer>
        <p>© 2026 MonSite — Tous droits réservés</p>
    </footer>
<script>
    const params = new URLSearchParams(window.location.search);
    const statut = params.get('statut');
    const div = document.getElementById('message-statut');

    if (statut === 'succes') {
        div.innerHTML = '✅ Message envoyé avec succès !';
        div.style.cssText = 'background:#2ecc71;color:white;padding:1rem;border-radius:8px;margin-bottom:1.5rem;text-align:center;';
    } else if (statut === 'erreur') {
        div.innerHTML = '❌ Erreur lors de l\'envoi. Réessayez.';
        div.style.cssText = 'background:#e74c3c;color:white;padding:1rem;border-radius:8px;margin-bottom:1.5rem;text-align:center;';
    }
</script>

</body>
</html>
